<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapitan Interactive Map</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar animate-nav">
        <div class="nav-logo">
            <img src="assets/logo.png" alt="Dapitan Logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-item">Home</a></li>
            <li><a href="explore.html" class="nav-item">Explore</a></li>
            <li><a href="#" class="nav-item active">Map</a></li>
            <li><a href="contacts.html" class="nav-item">Contacts</a></li>
        </ul>
    </nav>

    <section class="hero">
        <img src="assets/back.png" alt="Background" class="layer background animate-bg" id="back">
        <div class="title-group animate-title" id="text">
            <h2 class="subheading">YOUR COMPASS</h2>
            <h1 class="text-main">MAP</h1>
        </div>
        <img src="assets/front.png" alt="Foreground" class="layer foreground animate-bg" id="front">
        <div class="title-group-hollow animate-title" id="text-hollow">
            <h2 class="subheading">YOUR COMPASS</h2>
            <h1 class="text-hollow-main">MAP</h1>
        </div>
    </section>

    <section class="content">
        <div class="map-container">
            <div class="section-header" style="text-align: center; margin-bottom: 30px;">
                <h2 class="section-title">Interactive Dapitan Map</h2>
                <div class="map-controls" style="margin-top: 20px; display: flex; gap: 15px; justify-content: center;">
                    <button id="btn-svg" class="btn active-toggle">Artistic Canvas</button>
                    <button id="btn-google" class="btn glass">Live Explorer</button>
                </div>
            </div>

            <div class="interactive-map-wrapper">
                <aside class="map-sidebar glass" id="mapSidebar">
                    <div class="sidebar-header">
                        <h3 class="sidebar-title">Destinations</h3>
                        <div class="filter-group">
                            <button class="filter-btn active" data-category="all">All</button>
                            <button class="filter-btn" data-category="historic">History</button>
                            <button class="filter-btn" data-category="nature">Nature</button>
                        </div>
                    </div>
                    <ul id="locationList" class="location-list">
                        </ul>
                </aside>

                <div class="map-viewport">
                    <div class="map-container-svg glass" id="svg-view-container">
                        <svg viewBox="0 0 1200 800" class="dapitan-map" id="dapitanMap">
                            <defs>
                                <radialGradient id="landGradient" cx="50%" cy="50%">
                                    <stop offset="0%" stop-color="#e8f5e8"/><stop offset="100%" stop-color="#b8d0b8"/>
                                </radialGradient>
                                <radialGradient id="waterGradient" cx="50%" cy="50%">
                                    <stop offset="0%" stop-color="#a8d8f0"/><stop offset="100%" stop-color="#5a98c0"/>
                                </radialGradient>
                            </defs>

                            <path class="map-land" d="M100,200 Q150,100 300,150 T500,200 Q600,250 700,220 T900,250 Q1050,280 1100,300 T1150,350 L1150,700 L50,700 Z" fill="url(#landGradient)"/>
                            <ellipse class="map-water" cx="400" cy="450" rx="200" ry="120" fill="url(#waterGradient)" opacity="0.6"/>

                            <g class="map-marker" data-location="rizal-shrine">
                                <circle cx="250" cy="280" r="18" fill="#ff6b6b" stroke="white" stroke-width="3" />
                                <text x="250" y="285" text-anchor="middle" font-weight="bold" fill="white">R</text>
                            </g>

                            <g class="map-marker" data-location="dakak-beach">
                                <circle cx="850" cy="320" r="18" fill="#4ecdc4" stroke="white" stroke-width="3" />
                                <text x="850" y="325" text-anchor="middle" font-weight="bold" fill="white">🏖️</text>
                            </g>

                            <g class="map-marker" data-location="sumlog-falls">
                                <circle cx="450" cy="380" r="18" fill="#3498db" stroke="white" stroke-width="3" />
                                <text x="450" y="385" text-anchor="middle" font-weight="bold" fill="white">💧</text>
                            </g>
                        </svg>

                        <div class="map-tooltip" id="mapTooltip">
                            <div class="tooltip-content">
                                </div>
                        </div>
                    </div>

                    <div id="google-map-container" class="glass" style="display: none; height: 100%; border-radius: 32px; overflow: hidden;">
                        <div id="googleMap" style="width: 100%; height: 100%;"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script async src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
    <script src="js/script.js"></script>
    <script src="js/map-script.js"></script>
</body>
</html>
